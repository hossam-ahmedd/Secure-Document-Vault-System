<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Vault | Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo-box">🛡️</div>

      <h1>Create Account</h1>
      <p class="subtitle">Register to upload and protect your sensitive documents.</p>

      <form id="registerForm">
        <label>Name</label>
        <input type="text" id="registerName" placeholder="Enter your name" required />

        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="Enter your email" required />

        <label>Password</label>
        <input type="password" id="registerPassword" placeholder="Example: Test@12345" required />

        <p class="hint">
          Password must include uppercase, lowercase, number, special character, and at least 8 characters.
        </p>

        <div id="registerMessage"></div>

        <button type="submit" class="primary-btn">Register</button>
      </form>

      <p class="switch-text">
        Already have an account?
        <a href="index.html">Login</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
