<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Vault | Admin Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">🔐 Secure Vault</div>

    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <main class="container">
    <section class="hero small-hero">
      <div>
        <p class="tag">Admin Panel</p>
        <h1>Manage Users</h1>
        <p>Admins can view users and update their roles.</p>
      </div>
      <div class="hero-icon">👥</div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Users</h2>
          <p class="muted">Change users between admin, manager, and user.</p>
        </div>

        <button id="refreshUsersBtn" class="secondary-btn">Refresh</button>
      </div>

      <div id="adminMessage"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Current Role</th>
              <th>Change Role</th>
            </tr>
          </thead>

          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
